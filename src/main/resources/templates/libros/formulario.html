<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tituloPantalla}">Registrar Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/libros.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <i class="bi bi-book-half"></i> Biblioteca Digital
        </div>
        <div class="navbar-links">
            <a th:href="@{/admin/libros}" class="nav-link">
                <i class="bi bi-collection"></i> Catálogo
            </a>
            <a th:href="@{/chat}" class="nav-link">
                <i class="bi bi-chat-dots"></i> ChatBot
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="main-card" style="max-width: 600px; margin: 0 auto;">
            <h1 th:text="${tituloPantalla}">Registrar Libro</h1>
            <form th:action="@{/admin/libros/guardar}" th:object="${libro}" method="post" class="mt-4">
                <div class="mb-3">
                    <label class="form-label fw-bold">Título</label>
                    <input type="text" th:field="*{titulo}" class="form-control" placeholder="Ej: Don Quijote" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Autor</label>
                    <input type="text" th:field="*{autor}" class="form-control" placeholder="Ej: Miguel de Cervantes" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">ISBN</label>
                    <input type="text" th:field="*{isbn}" class="form-control" placeholder="Ej: 978-0001">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Año de Publicación</label>
                    <input type="number" th:field="*{anioPublicacion}" class="form-control" placeholder="Ej: 2024">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn-primary-custom">
                        <i class="bi bi-floppy"></i> Guardar Libro
                    </button>
                    <a th:href="@{/admin/libros}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
