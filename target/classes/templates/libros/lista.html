<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tituloPantalla}">Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/libros.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <i class="bi bi-book-half"></i> Biblioteca Digital
        </div>
        <div class="navbar-links">
            <a th:href="@{/admin/libros}" class="nav-link active">
                <i class="bi bi-collection"></i> Catálogo
            </a>
            <a th:href="@{/chat}" class="nav-link">
                <i class="bi bi-chat-dots"></i> ChatBot
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="main-card">
            <h1 th:text="${tituloPantalla}">Lista de Libros</h1>
            <div class="action-bar">
                <p class="text-muted mb-0">Gestione su catálogo. El ChatBot conoce todos estos libros.</p>
                <div class="d-flex gap-2">
                    <a th:href="@{/chat}" class="btn-chat-link">
                        <i class="bi bi-chat-dots-fill"></i> Preguntar al Bot
                    </a>
                    <a th:href="@{/admin/libros/nuevo}" class="btn-primary-custom">
                        <i class="bi bi-plus-lg"></i> Agregar Libro
                    </a>
                </div>
            </div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th><th>Título</th><th>Autor</th><th>ISBN</th><th>Año</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="libro : ${libros}">
                            <td><span class="badge-custom" th:text="'#' + ${libro.id}">ID</span></td>
                            <td class="fw-bold" th:text="${libro.titulo}">Título</td>
                            <td th:text="${libro.autor}">Autor</td>
                            <td><code class="text-muted" th:text="${libro.isbn}">ISBN</code></td>
                            <td th:text="${libro.anioPublicacion}">Año</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(libros)}">
                            <td colspan="5" class="text-center py-5">
                                <i class="bi bi-book-half fs-1 text-muted d-block mb-3"></i>
                                <p class="text-muted">No hay libros registrados aún.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
